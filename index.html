<!--
Single-file Maintenance Page
Customize at the top of the <script> section: change `TITLE`, `MESSAGE`, `ETA` (ISO date or null), `SHOW_EMAIL_FORM`.
Designed to drop into any webserver as index.html while the site is down.
-->


<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sedang Maintenance</title>
<style>
:root{
--bg:#0f1724; /* dark navy */
--card:#0b1220;
--accent:#7c3aed; /* purple */
--muted:#9aa6b2;
--glass: rgba(255,255,255,0.04);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(1000px 600px at 10% 10%, rgba(124,58,237,0.12), transparent), radial-gradient(900px 500px at 90% 90%, rgba(59,130,246,0.08), transparent), var(--bg);font-family:Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;color:#e6eef6}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
.card{width:100%;max-width:980px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:18px;padding:28px;box-shadow: 0 10px 30px rgba(2,6,23,0.6);display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:center}
@media (max-width:880px){.card{grid-template-columns:1fr;max-width:760px;padding:20px}}
.left h1{margin:0;font-size:28px;letter-spacing:-0.02em}
.left p{color:var(--muted);margin-top:12px;line-height:1.5}
.illus{width:100%;height:220px;display:flex;align-items:center;justify-content:center}
.scene{width:100%;max-width:420px}
.right{background:var(--glass);border-radius:12px;padding:18px}
.meta{display:flex;align-items:center;gap:12px}
.meta .dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#00bcd4);box-shadow:0 4px 18px rgba(124,58,237,0.28)}
.count{font-weight:700;font-size:30px;margin-top:8px}
.muted{color:var(--muted);font-size:13px}
.progress{height:10px;background:rgba(255,255,255,0.04);border-radius:999px;margin-top:12px;overflow:hidden}
.progress > i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#06b6d4);transition:width 600ms cubic-bezier(.2,.9,.3,1)}
.actions{display:flex;gap:8px;margin-top:14px}
.btn{border:0;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
.btn.ghost{background:transparent;color:#dbeafe;border:1px solid rgba(255,255,255,0.06)}
.btn.primary{background:linear-gradient(90deg,var(--accent),#06b6d4);color:#041027}
.email-form{display:flex;gap:8px;margin-top:12px}
.email-form input{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
.small{font-size:13px;color:var(--muted);margin-top:8px}
footer{margin-top:20px;color:var(--muted);font-size:13px}
/* simple animation */
.spinner{width:46px;height:46px;border-radius:50%;display:inline-grid;place-items:center;background:linear-gradient(180deg, rgba(255,255,255,0.03), transparent);box-shadow: inset 0 -6px 24px rgba(2,6,23,0.6)}
.gear{width:28px;height:28px;transform-origin:center;animation:spin 6s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* accessibility focus */
a:focus, button:focus, input:focus{outline:2px solid rgba(124,58,237,0.24);outline-offset:3px}
</style>
</head>
<body>
<main class="wrap">
<article class="card" role="main" aria-labelledby="title">
<section class="left">
<div class="meta" aria-hidden="true">
<div class="dot" aria-hidden="true"></div>
<div class="muted">Pembaruan situs</div>
</div>
<h1 id="title">Sedang dalam perbaikan — Halaman web akan segera kembali</h1>
<p id="message">Maaf atas ketidaknyamanan ini. Saya sedang melakukan pembaruan. Terima kasih.</p>


<div class="illus">
</html>
